<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="100%" height="100%">
  <defs>
    <!-- Background grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(248, 248, 242, 0.03)" stroke-width="1" />
    </pattern>
    <!-- Cyan glow filter -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Blue glow filter -->
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Red glow filter for alerts -->
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base theme background -->
  <rect width="100%" height="100%" fill="#050505" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Ambient blue and cyan lighting -->
  <circle cx="200" cy="200" r="300" fill="#0066cc" opacity="0.08" filter="blur(60px)" />
  <circle cx="1080" cy="600" r="350" fill="#00f2fe" opacity="0.05" filter="blur(80px)" />

  <!-- Top Navigation HUD Bar -->
  <g transform="translate(0, 0)">
    <rect x="30" y="30" width="1220" height="60" rx="12" fill="rgba(10, 10, 11, 0.6)" stroke="rgba(0, 242, 254, 0.2)" stroke-width="1" />
    <line x1="30" y1="90" x2="1250" y2="90" stroke="rgba(0, 242, 254, 0.1)" stroke-width="1" />
    
    <!-- Title / Logo -->
    <text x="60" y="68" font-family="monospace" font-size="28" font-weight="bold" fill="#00f2fe" filter="url(#glow-cyan)" letter-spacing="4">SHINE</text>
    <text x="180" y="65" font-family="monospace" font-size="12" fill="rgba(248, 248, 242, 0.4)" letter-spacing="1">|| DROPOUT RISK PREDICTION SYSTEM</text>
    
    <!-- HUD status readings -->
    <rect x="980" y="47" width="12" height="12" fill="#00f2fe" filter="url(#glow-cyan)" />
    <text x="1005" y="58" font-family="monospace" font-size="11" fill="#00f2fe" letter-spacing="1">SYSTEM STATUS: ACTIVE</text>
    
    <circle cx="1180" cy="53" r="5" fill="#3b82f6" filter="url(#glow-blue)" />
    <text x="1195" y="57" font-family="monospace" font-size="11" fill="#3b82f6" letter-spacing="1">JARVIS.AI</text>
  </g>

  <!-- Left Column: Holographic 3D Diagnostic Scanner (Iron Man HUD feel) -->
  <g transform="translate(50, 120)">
    <!-- Diagnostic panel frame -->
    <rect width="550" height="630" rx="20" fill="rgba(10, 10, 11, 0.4)" stroke="rgba(248, 248, 242, 0.06)" stroke-width="1" />
    <rect width="550" height="630" rx="20" fill="none" stroke="rgba(0, 242, 254, 0.15)" stroke-width="1" filter="url(#glow-cyan)" opacity="0.5" />
    
    <!-- HUD circular scan grid -->
    <circle cx="275" cy="280" r="160" fill="none" stroke="rgba(0, 242, 254, 0.1)" stroke-width="1" />
    <circle cx="275" cy="280" r="120" fill="none" stroke="rgba(0, 242, 254, 0.15)" stroke-dasharray="8, 6" stroke-width="1" />
    <circle cx="275" cy="280" r="80" fill="none" stroke="rgba(3b, 82, f6, 0.2)" stroke-width="1.5" />
    <circle cx="275" cy="280" r="40" fill="none" stroke="rgba(0, 242, 254, 0.4)" stroke-dasharray="2, 4" stroke-width="1" />

    <!-- Scanner Crosshairs -->
    <line x1="275" y1="80" x2="275" y2="480" stroke="rgba(0, 242, 254, 0.1)" stroke-width="1" />
    <line x1="75" y1="280" x2="475" y2="280" stroke="rgba(0, 242, 254, 0.1)" stroke-width="1" />

    <!-- Rotating HUD dial segments -->
    <path d="M 275 140 A 140 140 0 0 1 405 235" fill="none" stroke="#00f2fe" stroke-width="3" filter="url(#glow-cyan)" />
    <path d="M 275 420 A 140 140 0 0 1 145 325" fill="none" stroke="#3b82f6" stroke-width="3.5" filter="url(#glow-blue)" />

    <!-- Mock Data nodes (representing student features) -->
    <circle cx="210" cy="200" r="6" fill="#ef4444" filter="url(#glow-red)" />
    <line x1="210" y1="200" x2="160" y2="160" stroke="#ef4444" stroke-width="1" opacity="0.7" />
    <text x="100" y="150" font-family="monospace" font-size="11" fill="#ef4444">ATTENDANCE: 42% (CRITICAL)</text>

    <circle cx="360" cy="340" r="6" fill="#f59e0b" filter="url(#glow-red)" />
    <line x1="360" y1="340" x2="410" y2="380" stroke="#f59e0b" stroke-width="1" opacity="0.7" />
    <text x="415" y="390" font-family="monospace" font-size="11" fill="#f59e0b">ENGAGEMENT DRIFT: HIGH</text>

    <circle cx="310" cy="210" r="5" fill="#00f2fe" filter="url(#glow-cyan)" />
    <line x1="310" y1="210" x2="380" y2="170" stroke="#00f2fe" stroke-width="1" opacity="0.7" />
    <text x="390" y="165" font-family="monospace" font-size="11" fill="#00f2fe">MID-TERM: 68%</text>

    <!-- Scan Line -->
    <line x1="110" y1="250" x2="440" y2="250" stroke="#00f2fe" stroke-width="2" filter="url(#glow-cyan)" opacity="0.8" />
    
    <!-- Title overlay in panel -->
    <text x="30" y="520" font-family="monospace" font-size="14" font-weight="bold" fill="rgba(248, 248, 242, 0.8)">ML ACTIVE SCANS: ENSEMBLE CLASSIFIERS</text>
    <text x="30" y="550" font-family="monospace" font-size="11" fill="rgba(248, 248, 242, 0.45)">XGBOOST CORE ENGINE &middot; SHAP INTERPRETABILITY VALUE GRAPH</text>

    <!-- Small graph representing SHAP value features -->
    <g transform="translate(30, 570)">
      <rect x="0" y="5" width="220" height="12" fill="rgba(239, 68, 68, 0.2)" stroke="rgba(239, 68, 68, 0.4)" stroke-width="1" />
      <rect x="0" y="5" width="180" height="12" fill="#ef4444" filter="url(#glow-red)" opacity="0.8" />
      <text x="235" y="14" font-family="monospace" font-size="10" fill="#ef4444">Attendance Impact (-0.38)</text>

      <rect x="0" y="25" width="220" height="12" fill="rgba(245, 158, 11, 0.2)" stroke="rgba(245, 158, 11, 0.4)" stroke-width="1" />
      <rect x="0" y="25" width="130" height="12" fill="#f59e0b" opacity="0.8" />
      <text x="235" y="34" font-family="monospace" font-size="10" fill="#f59e0b">Assignment Delay (-0.21)</text>
    </g>
  </g>

  <!-- Right Column: Student Risk Profiles & AI Diagnostics -->
  <g transform="translate(630, 120)">
    <!-- Right Panel frame -->
    <rect width="600" height="630" rx="20" fill="rgba(10, 10, 11, 0.4)" stroke="rgba(248, 248, 242, 0.06)" stroke-width="1" />
    <rect width="600" height="630" rx="20" fill="none" stroke="rgba(59, 130, 246, 0.15)" stroke-width="1" filter="url(#glow-blue)" opacity="0.3" />

    <!-- AI Diagnostic Chatbot Panel -->
    <g transform="translate(30, 30)">
      <rect width="540" height="220" rx="14" fill="rgba(5, 5, 5, 0.7)" stroke="rgba(0, 242, 254, 0.12)" stroke-width="1" />
      <text x="20" y="30" font-family="monospace" font-size="12" font-weight="bold" fill="#00f2fe" filter="url(#glow-cyan)">SHINE AI ASSISTANT &gt;_</text>
      
      <!-- Mock terminal conversation -->
      <text x="20" y="65" font-family="monospace" font-size="11" fill="rgba(248, 248, 242, 0.5)">[system]: Initializing dropout diagnostic protocols...</text>
      <text x="20" y="90" font-family="monospace" font-size="11" fill="#3b82f6">[mentor]: JARVIS, show me at-risk students in Batch B.</text>
      
      <path d="M 20 110 L 520 110" stroke="rgba(0, 242, 254, 0.08)" stroke-width="1" />
      
      <text x="20" y="135" font-family="monospace" font-size="11" fill="#00f2fe">[SHINE.AI]: Found 1 Critical risk profile. Student ID #8095.</text>
      <text x="20" y="155" font-family="monospace" font-size="11" fill="#00f2fe">   - Risk Probability: 89.4% (Classified: High Risk)</text>
      <text x="20" y="175" font-family="monospace" font-size="11" fill="#00f2fe">   - Recommendation: Trigger Counseling Protocol B-12.</text>
      
      <!-- Blinking cursor -->
      <rect x="20" y="193" width="8" height="12" fill="#00f2fe" filter="url(#glow-cyan)" opacity="0.8" />
    </g>

    <!-- At-Risk Batch Overview & Metrics -->
    <g transform="translate(30, 280)">
      <text x="0" y="20" font-family="monospace" font-size="14" font-weight="bold" fill="rgba(248, 248, 242, 0.8)">BATCH CRITICAL ALERT PROFILES</text>
      <line x1="0" y1="35" x2="540" y2="35" stroke="rgba(248, 248, 242, 0.08)" stroke-width="1" />

      <!-- Row 1: High Risk Student Card -->
      <g transform="translate(0, 50)">
        <rect width="540" height="90" rx="12" fill="rgba(239, 68, 68, 0.05)" stroke="rgba(239, 68, 68, 0.25)" stroke-width="1" />
        <!-- Glowing vertical tag -->
        <rect width="6" height="90" rx="3" fill="#ef4444" filter="url(#glow-red)" />
        
        <text x="25" y="30" font-family="monospace" font-size="13" font-weight="bold" fill="#f8f8f2">Student: Rahul S. (ID: 8095)</text>
        <text x="25" y="55" font-family="monospace" font-size="11" fill="rgba(248, 248, 242, 0.45)">CSE Branch - Term 5 | Attendance Rate: 42% | CGPA: 6.2</text>
        <text x="25" y="72" font-family="monospace" font-size="11" fill="#ef4444" font-weight="bold">DROPOUT PROBABILITY: 89.4% [CRITICAL]</text>
        
        <!-- Action Tag -->
        <rect x="420" y="17" width="100" height="22" rx="4" fill="rgba(239, 68, 68, 0.2)" stroke="#ef4444" stroke-width="1" />
        <text x="432" y="31" font-family="monospace" font-size="9" font-weight="bold" fill="#ef4444">INTERVENE NOW</text>
      </g>

      <!-- Row 2: Medium Risk Student Card -->
      <g transform="translate(0, 160)">
        <rect width="540" height="90" rx="12" fill="rgba(245, 158, 11, 0.03)" stroke="rgba(245, 158, 11, 0.15)" stroke-width="1" />
        <rect width="6" height="90" rx="3" fill="#f59e0b" />
        
        <text x="25" y="30" font-family="monospace" font-size="13" font-weight="bold" fill="#f8f8f2">Student: Priya K. (ID: 7984)</text>
        <text x="25" y="55" font-family="monospace" font-size="11" fill="rgba(248, 248, 242, 0.45)">CSE Branch - Term 5 | Attendance Rate: 68% | CGPA: 7.8</text>
        <text x="25" y="72" font-family="monospace" font-size="11" fill="#f59e0b" font-weight="bold">DROPOUT PROBABILITY: 54.1% [WARNING]</text>

        <rect x="420" y="17" width="100" height="22" rx="4" fill="rgba(245, 158, 11, 0.1)" stroke="#f59e0b" stroke-width="1" />
        <text x="435" y="31" font-family="monospace" font-size="9" fill="#f59e0b">SCHEDULE CHAT</text>
      </g>

      <!-- Row 3: Low Risk Profile -->
      <g transform="translate(0, 270)">
        <rect width="540" height="60" rx="12" fill="rgba(248, 248, 242, 0.02)" stroke="rgba(248, 248, 242, 0.05)" stroke-width="1" />
        <rect width="6" height="60" rx="3" fill="rgba(248, 248, 242, 0.2)" />
        
        <text x="25" y="25" font-family="monospace" font-size="13" font-weight="bold" fill="rgba(248, 248, 242, 0.6)">Other Batch Profiles Scanned (34 Students)</text>
        <text x="25" y="44" font-family="monospace" font-size="11" fill="rgba(248, 248, 242, 0.3)">Nominal status &mdash; Dropout risk averages: 4.8% [SAFE]</text>
      </g>
    </g>
  </g>
</svg>
